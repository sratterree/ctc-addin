<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CTC File Namer</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0F1117;
  --surface:  #16181F;
  --surface2: #1A1D26;
  --surface3: #22253A;
  --border:   #2A2D38;
  --border2:  #3A3D4A;
  --text:     #E8E8E0;
  --muted:    #888;
  --dim:      #555;
  --orange:   #E67E22;
  --green:    #27AE60;
  --red:      #C0392B;
  --blue:     #2980B9;
  --purple:   #8E44AD;
  --teal:     #16A085;
  --yellow:   #F39C12;
  --mono: 'IBM Plex Mono', 'Courier New', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  overflow-x: hidden;
}

::selection { background: var(--orange); color: #000; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ---- HEADER ---- */
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--orange);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.ctc-badge {
  background: var(--orange);
  color: #000;
  font-weight: 700;
  font-size: 10px;
  padding: 3px 7px;
  letter-spacing: 2px;
  flex-shrink: 0;
}
.header-text .title { font-family: var(--sans); font-weight: 700; font-size: 13px; }
.header-text .sub { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-top: 1px; }

/* ---- MAIN ---- */
.main { padding: 14px; }

/* ---- API KEY SETUP ---- */
.api-setup {
  background: var(--surface2);
  border: 1px solid var(--orange);
  border-radius: 5px;
  padding: 14px;
  margin-bottom: 14px;
}
.api-setup-title { font-family: var(--sans); font-weight: 600; font-size: 12px; color: var(--orange); margin-bottom: 5px; }
.api-setup-desc { font-size: 11px; color: var(--muted); font-family: var(--sans); line-height: 1.5; margin-bottom: 10px; }
.api-row { display: flex; gap: 7px; }
input[type="password"], input[type="text"] {
  flex: 1;
  min-width: 0;
  background: #0F1117;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 10px;
  outline: none;
}
input[type="password"]:focus, input[type="text"]:focus { border-color: var(--orange); }
input::placeholder { color: var(--dim); }

/* ---- BUTTONS ---- */
.btn {
  background: var(--orange);
  border: none;
  color: #000;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 7px 13px;
  border-radius: 3px;
  cursor: pointer;
  white-space: nowrap;
  transition: filter 0.15s, background 0.15s;
  flex-shrink: 0;
}
.btn:hover { filter: brightness(1.1); }
.btn:disabled { background: var(--border2); color: var(--dim); cursor: not-allowed; filter: none; }
.btn-sm {
  font-size: 9px;
  padding: 5px 10px;
  letter-spacing: 0.8px;
}
.btn-ghost {
  background: var(--surface3);
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--border2); filter: none; color: var(--text); }
.btn-green { background: var(--green); }
.btn-green.copied { background: var(--teal); }

/* ---- EMAIL INFO ---- */
.email-info {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 12px 13px;
  margin-bottom: 12px;
}
.email-info-row { display: flex; gap: 8px; margin-bottom: 5px; align-items: baseline; }
.email-info-row:last-child { margin-bottom: 0; }
.ei-label { font-size: 9px; color: var(--dim); letter-spacing: 1.5px; min-width: 40px; flex-shrink: 0; }
.ei-value { font-size: 11px; color: var(--text); font-family: var(--sans); word-break: break-word; }

/* ---- SCAN BUTTON ROW ---- */
.scan-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.attachment-count {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--sans);
}
.attachment-count span { color: var(--orange); font-weight: 600; }

/* ---- LOADING ---- */
.loading {
  display: none;
  align-items: center;
  gap: 9px;
  padding: 14px 0;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--sans);
}
.loading.show { display: flex; }
.dots { display: flex; gap: 3px; }
.dots span {
  width: 5px; height: 5px;
  background: var(--orange);
  border-radius: 50%;
  animation: dotpulse 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotpulse { 0%,100%{opacity:0.3;transform:scale(0.7)} 50%{opacity:1;transform:scale(1)} }

/* ---- ATTACHMENT CARDS ---- */
.attachments { display: flex; flex-direction: column; gap: 10px; }

.att-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 5px;
  overflow: hidden;
  animation: fadeIn 0.2s ease-out;
}
.att-card.has-suggestion { border-color: var(--border2); }

@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.att-original {
  padding: 9px 12px;
  background: #0F1117;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}
.att-ext-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--surface3);
  color: var(--muted);
  letter-spacing: 1px;
  flex-shrink: 0;
  text-transform: uppercase;
}
.att-orig-name { font-size: 11px; color: var(--muted); word-break: break-all; font-family: var(--sans); }

.att-body { padding: 11px 12px; }

/* Suggested name label */
.suggest-label {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 1.5px;
  margin-bottom: 5px;
}

/* Editable name field */
.att-name-input {
  width: 100%;
  background: #0F1117;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--orange);
  font-family: var(--mono);
  font-weight: 600;
  font-size: 12px;
  padding: 7px 10px;
  margin-bottom: 9px;
  outline: none;
  transition: border-color 0.15s;
}
.att-name-input:focus { border-color: var(--orange); }

/* Folder badge */
.folder-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 9px;
  flex-wrap: wrap;
}
.folder-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 2px;
  color: #fff;
  letter-spacing: 0.5px;
}
.trade-badge {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 2px;
  background: var(--surface3);
  color: var(--muted);
  font-family: var(--sans);
}
.confidence-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Reasoning */
.att-reasoning {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--sans);
  line-height: 1.5;
  margin-bottom: 10px;
  padding: 7px 10px;
  background: #0F1117;
  border-radius: 3px;
  border-left: 2px solid var(--border2);
}

/* Action row */
.att-actions { display: flex; gap: 7px; flex-wrap: wrap; }

/* ---- NO ATTACHMENTS ---- */
.empty-state {
  text-align: center;
  padding: 30px 14px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  display: none;
}
.empty-state.show { display: block; }
.empty-icon { font-size: 28px; margin-bottom: 8px; }

/* ---- TOAST ---- */
.toast {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: #000;
  font-family: var(--mono);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 1px;
  padding: 8px 18px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ---- ERROR ---- */
.error-box {
  background: #1A0A0A;
  border: 1px solid var(--red);
  border-radius: 4px;
  padding: 10px 12px;
  font-size: 11px;
  color: #E88;
  font-family: var(--sans);
  margin-bottom: 12px;
  display: none;
}
.error-box.show { display: block; }

/* ---- SECTION TITLE ---- */
.section-title {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="ctc-badge">CTC</div>
  <div class="header-text">
    <div class="title">FILE NAMER</div>
    <div class="sub">ATTACHMENT ROUTING TOOL</div>
  </div>
</div>

<div class="main">

  <!-- API KEY SETUP -->
  <div class="api-setup" id="api-setup">
    <div class="api-setup-title">🔑 One-time Setup — Anthropic API Key</div>
    <div class="api-setup-desc">Required once per device. Your key is stored locally only.<br>Get a key at <strong>console.anthropic.com</strong> → API Keys.</div>
    <div class="api-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..."/>
      <button class="btn btn-sm" onclick="saveKey()">SAVE</button>
    </div>
  </div>

  <!-- EMAIL INFO -->
  <div class="email-info" id="email-info">
    <div class="email-info-row">
      <span class="ei-label">FROM</span>
      <span class="ei-value" id="ei-from">—</span>
    </div>
    <div class="email-info-row">
      <span class="ei-label">SUBJ</span>
      <span class="ei-value" id="ei-subject">—</span>
    </div>
    <div class="email-info-row">
      <span class="ei-label">DATE</span>
      <span class="ei-value" id="ei-date">—</span>
    </div>
  </div>

  <!-- ERROR BOX -->
  <div class="error-box" id="error-box"></div>

  <!-- SCAN ROW -->
  <div class="scan-row">
    <button class="btn" id="scan-btn" onclick="scanAttachments()">⚡ SCAN &amp; NAME ATTACHMENTS</button>
    <div class="attachment-count" id="att-count"></div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="dots"><span></span><span></span><span></span></div>
    <span id="loading-text">Reading attachments...</span>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📭</div>
    <div>No attachments found in this email.</div>
  </div>

  <!-- ATTACHMENT CARDS -->
  <div class="section-title" id="results-label" style="display:none;">SUGGESTED NAMES</div>
  <div class="attachments" id="attachments-container"></div>

</div><!-- /main -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// FOLDER DATA
// ============================================================
const FOLDERS = [
  { id:"00", name:"00_Project Controls", color:"#E67E22" },
  { id:"01", name:"01_Drawings",         color:"#2980B9" },
  { id:"02", name:"02_Permits",          color:"#27AE60" },
  { id:"03", name:"03_Procurement",      color:"#8E44AD" },
  { id:"04", name:"04_Field Operations", color:"#C0392B" },
  { id:"05", name:"05_Insurance",        color:"#16A085" },
  { id:"06", name:"06_Project Accounting", color:"#F39C12" },
];

const SYSTEM_PROMPT = `You are a file naming assistant for CTC Residential, a multifamily construction company in Texas.

Your job: Given an email context and a list of attachments, suggest a professional file name and folder for EACH attachment using CTC's naming standard.

NAMING FORMAT: YYMMDD_Vendor_Description.ext
- YYMMDD = date from the email (e.g. 250312 for March 12, 2025)
- Vendor = company/sender name, no spaces (e.g. ABCPlumbing, TKEElevator, Siemens)
- Description = short document type, underscores for spaces (e.g. Bid, Subcontract, FireAlarmSubmittal, RFI_014, ShopDrawing)
- Keep vendor and description short and clear
- If no vendor is relevant (internal doc), omit vendor section
- Preserve the original file extension exactly

FOLDER ROUTING RULES:
- 00_Project Controls: Schedules, meeting minutes, OAC notes, coordination logs, planning docs
- 01_Drawings: Architectural, structural, civil, MEP drawings from architect/engineer. NEVER shop drawings.
- 02_Permits: Building permits, city approvals, inspection sign-offs, fire marshal docs, CO
- 03_Procurement: Bids, quotes, subcontracts, submittals, SHOP DRAWINGS, product data, POs, shipping. Always include trade subfolder.
- 04_Field Operations: RFIs, site photos, daily reports, punch lists, field instructions, as-builts, closeout
- 05_Insurance: COIs, builder's risk, liability, workers comp, bonds
- 06_Project Accounting: Pay applications, invoices, lien waivers, change orders, budget reports

CRITICAL RULES:
- Shop drawings → ALWAYS 03_Procurement, never 01_Drawings
- RFIs → ALWAYS 04_Field Operations
- COIs → ALWAYS 05_Insurance
- Pay apps → ALWAYS 06_Project Accounting

Respond ONLY with valid JSON array, one object per attachment:
[
  {
    "original_name": "original filename.pdf",
    "suggested_name": "250312_ABCPlumbing_Bid.pdf",
    "folder_id": "03",
    "folder_name": "03_Procurement",
    "trade_subfolder": "Plumbing",
    "confidence": "high",
    "reasoning": "One sentence explaining the routing decision."
  }
]

Rules:
- suggested_name must include the extension from original_name
- trade_subfolder only for 03_Procurement, otherwise ""
- confidence: "high", "medium", or "low"
- Return ONLY the JSON array, no markdown, no preamble`;

// ============================================================
// STATE
// ============================================================
let emailContext = { from: '', subject: '', date: '', body: '' };
let suggestions  = [];

// ============================================================
// INIT
// ============================================================
Office.onReady(info => {
  if (info.host === Office.HostType.Outlook) {
    loadEmailContext();
    if (getKey()) {
      document.getElementById('api-setup').style.display = 'none';
    }
  }
});

// ============================================================
// API KEY
// ============================================================
function getKey()  { return localStorage.getItem('ctc_api_key') || ''; }
function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) { showError('Key must start with sk-ant-...'); return; }
  localStorage.setItem('ctc_api_key', val);
  document.getElementById('api-setup').style.display = 'none';
  showToast('✓ Key saved');
}

// ============================================================
// LOAD EMAIL CONTEXT
// ============================================================
function loadEmailContext() {
  const item = Office.context.mailbox.item;

  // Subject
  const subject = item.subject || '(no subject)';
  emailContext.subject = subject;
  document.getElementById('ei-subject').textContent = subject;

  // From
  const from = item.from ? (item.from.displayName || item.from.emailAddress) : '—';
  emailContext.from = from;
  document.getElementById('ei-from').textContent = from;

  // Date
  const dateReceived = item.dateTimeCreated;
  if (dateReceived) {
    const d = new Date(dateReceived);
    const formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const yy = String(d.getFullYear()).slice(2);
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    emailContext.date = `${yy}${mm}${dd}`;
    emailContext.dateFormatted = formatted;
    document.getElementById('ei-date').textContent = formatted;
  }

  // Count attachments
  const atts = item.attachments || [];
  const fileAtts = atts.filter(a => !a.isInline);
  if (fileAtts.length > 0) {
    document.getElementById('att-count').innerHTML = `<span>${fileAtts.length}</span> attachment${fileAtts.length !== 1 ? 's' : ''} found`;
  }
}

// ============================================================
// SCAN ATTACHMENTS
// ============================================================
async function scanAttachments() {
  hideError();
  const apiKey = getKey();
  if (!apiKey) { showError('Enter your Anthropic API key in the setup box above.'); return; }

  const item = Office.context.mailbox.item;
  const allAtts = item.attachments || [];
  const fileAtts = allAtts.filter(a => !a.isInline);

  if (fileAtts.length === 0) {
    document.getElementById('empty-state').classList.add('show');
    return;
  }

  document.getElementById('empty-state').classList.remove('show');
  document.getElementById('attachments-container').innerHTML = '';
  document.getElementById('results-label').style.display = 'none';
  document.getElementById('scan-btn').disabled = true;

  setLoading(true, `Reading ${fileAtts.length} attachment${fileAtts.length !== 1 ? 's' : ''}...`);

  // Build attachment list for Claude
  const attList = fileAtts.map(a => ({
    name: a.name,
    size: a.size,
    contentType: a.contentType,
  }));

  // Get email body snippet for extra context
  let bodySnippet = '';
  try {
    await new Promise(resolve => {
      item.body.getAsync(Office.CoercionType.Text, { asyncContext: 'body' }, result => {
        if (result.status === Office.AsyncResultStatus.Succeeded) {
          bodySnippet = result.value.substring(0, 800).replace(/\s+/g, ' ').trim();
        }
        resolve();
      });
    });
  } catch(e) { /* body read optional */ }

  emailContext.body = bodySnippet;

  setLoading(true, 'Claude is analyzing attachments...');

  const userMessage = `Email context:
- From: ${emailContext.from}
- Subject: ${emailContext.subject}  
- Date (YYMMDD): ${emailContext.date}
- Body snippet: "${emailContext.body}"

Attachments to name and route:
${JSON.stringify(attList, null, 2)}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: userMessage }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const raw  = data.content[0].text.trim().replace(/```json|```/g,'').trim();
    suggestions  = JSON.parse(raw);

    setLoading(false);
    renderCards(suggestions, fileAtts);

  } catch(err) {
    setLoading(false);
    document.getElementById('scan-btn').disabled = false;
    showError('Error: ' + err.message);
  }
}

// ============================================================
// RENDER ATTACHMENT CARDS
// ============================================================
function renderCards(suggestions, fileAtts) {
  const container = document.getElementById('attachments-container');
  container.innerHTML = '';
  document.getElementById('results-label').style.display = 'block';
  document.getElementById('att-count').innerHTML = `<span>${suggestions.length}</span> attachment${suggestions.length !== 1 ? 's' : ''} processed`;

  suggestions.forEach((s, i) => {
    const folder = FOLDERS.find(f => f.id === s.folder_id) || FOLDERS[0];
    const confColor = s.confidence === 'high' ? '#27AE60' : s.confidence === 'medium' ? '#F39C12' : '#C0392B';
    const ext = (s.original_name.match(/\.[^.]+$/) || [''])[0].replace('.','').toUpperCase() || 'FILE';

    const card = document.createElement('div');
    card.className = 'att-card has-suggestion';
    card.id = `card-${i}`;
    card.innerHTML = `
      <div class="att-original">
        <span class="att-ext-badge">${ext}</span>
        <span class="att-orig-name">${s.original_name}</span>
      </div>
      <div class="att-body">
        <div class="suggest-label">SUGGESTED NAME — CLICK TO EDIT</div>
        <input type="text" class="att-name-input" id="name-${i}" value="${s.suggested_name}" />

        <div class="folder-row">
          <span class="folder-badge" style="background:${folder.color}">${folder.name}</span>
          ${s.trade_subfolder ? `<span class="trade-badge">/ ${s.trade_subfolder}</span>` : ''}
          <span class="confidence-dot" style="background:${confColor}" title="Confidence: ${s.confidence}"></span>
        </div>

        <div class="att-reasoning">${s.reasoning}</div>

        <div class="att-actions">
          <button class="btn btn-sm btn-green" id="copy-btn-${i}" onclick="copyName(${i})">COPY NAME</button>
          <button class="btn btn-sm btn-ghost" onclick="resetName(${i}, '${escapeStr(s.suggested_name)}')">RESET</button>
        </div>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('scan-btn').disabled = false;
}

function escapeStr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ============================================================
// ACTIONS
// ============================================================
function copyName(i) {
  const name = document.getElementById(`name-${i}`).value.trim();
  if (!name) return;
  navigator.clipboard.writeText(name).then(() => {
    const btn = document.getElementById(`copy-btn-${i}`);
    btn.textContent = '✓ COPIED';
    btn.classList.add('copied');
    showToast('✓ Copied: ' + name);
    setTimeout(() => {
      btn.textContent = 'COPY NAME';
      btn.classList.remove('copied');
    }, 1800);
  });
}

function resetName(i, original) {
  document.getElementById(`name-${i}`).value = original;
}

// ============================================================
// UI HELPERS
// ============================================================
function setLoading(show, text = '') {
  const el = document.getElementById('loading');
  el.classList.toggle('show', show);
  if (text) document.getElementById('loading-text').textContent = text;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('error-box').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
